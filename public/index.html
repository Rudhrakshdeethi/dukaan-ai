<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Dukaan AI — Store Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">D</div>
          <div class="brand-text">
            <strong>Dukaan AI</strong>
            <span id="store-name">Store</span>
          </div>
        </div>
        <span class="live"><span class="live-dot"></span> Live</span>
      </header>

      <section class="status">
        <div class="status-card">
          <span class="s-dot" id="chan-dot"></span>
          <div class="s-text">
            <strong>Bot</strong>
            <span class="muted" id="chan-sub">Telegram</span>
          </div>
        </div>
        <div class="status-card">
          <span class="s-dot" id="ai-dot"></span>
          <div class="s-text">
            <strong>AI Engine</strong>
            <span class="muted" id="ai-sub">Gemini</span>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Pending orders</h2>
          <span class="pill-count" id="orders-count">0</span>
        </div>
        <ul id="orders-list" class="orders-list"></ul>
      </section>

      <a class="cta" id="bot-link" href="https://t.me/dukaan_ai_niat_takeover26_bot" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
        Open the bot on Telegram
      </a>

      <footer class="foot"><span id="updated">—</span> · Dukaan AI · TakeOver&rsquo;26</footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
