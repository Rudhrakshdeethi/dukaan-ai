<!doctype html>
<html><head><meta charset="utf-8"><style>
  body { margin:0; }
  .bill {
    width: 420px; padding: 28px; background: #fffdf5; font-family: 'Segoe Script', 'Comic Sans MS', cursive;
    color: #1a2b3c; border: 1px solid #ddd;
  }
  h2 { margin: 0 0 4px; }
  .muted { color:#555; font-size: 13px; }
  hr { border:0; border-top: 1px dashed #999; margin: 14px 0; }
  .row { display:flex; justify-content: space-between; font-size: 18px; margin: 10px 0; }
  .tot { font-weight: bold; font-size: 20px; }
</style></head>
<body>
  <div class="bill">
    <h2>Sri Lakshmi Traders</h2>
    <div class="muted">Supplier Bill · 07/07/2026</div>
    <hr>
    <div class="row"><span>Maggi noodles</span><span>x 12 &nbsp; ₹14</span></div>
    <div class="row"><span>Amul Milk 500ml</span><span>x 20 &nbsp; ₹28</span></div>
    <div class="row"><span>Britannia Bread</span><span>x 8 &nbsp; ₹40</span></div>
    <div class="row"><span>Tata Sugar 1kg</span><span>x 6 &nbsp; ₹45</span></div>
    <div class="row"><span>Eggs (tray)</span><span>x 4 &nbsp; ₹210</span></div>
    <hr>
    <div class="row tot"><span>TOTAL</span><span>₹2,138</span></div>
  </div>
</body></html>
